name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"   # dispara em: v1.0.0, v1.1.0, etc.

permissions:
  contents: write  # necessário para criar releases

jobs:
  # ──────────────────────────────────────────────────
  # BUILD MAC
  # ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Gerar ícones
        run: python3 scripts/convert_icons.py

      - name: Build com PyInstaller
        run: pyinstaller LegacyBJJ.spec --noconfirm --clean

      - name: Criar DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if brew list create-dmg &>/dev/null 2>&1 || brew install create-dmg; then
            create-dmg \
              --volname "Legacy BJJ ${VERSION}" \
              --volicon "src/assets/icon.icns" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "LegacyBJJ.app" 175 190 \
              --hide-extension "LegacyBJJ.app" \
              --app-drop-link 425 190 \
              "dist/LegacyBJJ-${VERSION}-mac.dmg" \
              "dist/LegacyBJJ.app" || \
            hdiutil create -volname "Legacy BJJ ${VERSION}" \
              -srcfolder "dist/LegacyBJJ.app" \
              -ov -format UDZO \
              "dist/LegacyBJJ-${VERSION}-mac.dmg"
          else
            hdiutil create -volname "Legacy BJJ ${VERSION}" \
              -srcfolder "dist/LegacyBJJ.app" \
              -ov -format UDZO \
              "dist/LegacyBJJ-${VERSION}-mac.dmg"
          fi

      - name: Upload artefato Mac
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/LegacyBJJ-*-mac.dmg

  # ──────────────────────────────────────────────────
  # BUILD WINDOWS
  # ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Gerar ícone .ico
        run: python scripts/convert_icons.py

      - name: Build com PyInstaller
        run: pyinstaller LegacyBJJ.spec --noconfirm --clean

      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Criar instalador Windows
        shell: cmd
        run: |
          set VERSION=${{ github.ref_name }}
          set VERSION=%VERSION:v=%
          iscc /DAppVersion=%VERSION% /DOutputBaseFilename=LegacyBJJ-%VERSION%-windows-setup installer\setup.iss

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: dist/LegacyBJJ-*-windows-setup.exe

  # ──────────────────────────────────────────────────
  # CRIAR RELEASE NO GITHUB
  # ──────────────────────────────────────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artefato Mac
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/

      - name: Download artefato Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: artifacts/

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Legacy BJJ ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            ## Legacy BJJ ${{ github.ref_name }}

            ### Instalação
            - **Mac**: Baixe o `.dmg`, abra e arraste para a pasta Aplicativos
            - **Windows**: Baixe o `.exe` e siga o assistente de instalação

            ### Atualização automática
            O app notifica quando uma nova versão estiver disponível.
          files: artifacts/*
